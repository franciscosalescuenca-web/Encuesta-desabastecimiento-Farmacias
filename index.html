<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estudio Desabastecimiento</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #357337; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    h1 { color: white; text-align: center; font-size: 1.5rem; margin-bottom: 20px; max-width: 600px; }
    .card { background: #F9F9F9; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 500px; text-align: center; }
    .step { display: none; }
    .step.active { display: block; }
    button { background: #357337; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; font-weight: bold; }
    input, select { display: block; width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
    
    /* Estilos del buscador integrado */
    .campo-busqueda { position: relative; }
    #resultados { border: 1px solid #ddd; border-top: none; max-height: 200px; overflow-y: auto; background: white; position: absolute; width: 100%; z-index: 100; text-align: left; border-radius: 0 0 10px 10px; }
    .item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
    .item:hover { background-color: #f1f8e9; }
  </style>
</head>
<body>

<h1>Encuesta para Oficinas de Farmacia sobre el desabastecimiento de medicamentos en la Región de Murcia</h1>

<div class="card">
  <div class="step active" id="s1">
    <h3>Datos del registro</h3>
    <input type="text" id="cipa" placeholder="CIPA del Paciente">
    <input type="text" id="farmacia" placeholder="Nº Farmacia">
    
    <div class="campo-busqueda">
        <input type="text" id="medicamento" placeholder="Buscar medicamento..." oninput="buscarMedicamento()">
        <div id="resultados"></div>
    </div>

    <button onclick="irSiguiente()">Siguiente</button>
  </div>
</div>

<script>
  // Buscador CIMA
  async function buscarMedicamento() {
    const query = document.getElementById('medicamento').value;
    const contenedor = document.getElementById('resultados');
    
    if (query.length < 3) { contenedor.innerHTML = ""; return; }

    const url = `https://cima.aemps.es/cima/rest/medicamentos?nombre=${encodeURIComponent(query)}`;
    try {
      const response = await fetch(url);
      const data = await response.json();
      contenedor.innerHTML = "";

      if (data.resultados && data.resultados.length > 0) {
        data.resultados.slice(0, 8).forEach(med => {
          if (med.presentaciones && med.presentaciones.length > 0) {
            const pres = med.presentaciones[0];
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `<strong>${med.nombre}</strong><br><small>CN: ${pres.cn}</small>`;
            div.onclick = () => {
              document.getElementById('medicamento').value = `${med.nombre} (CN: ${pres.cn})`;
              contenedor.innerHTML = "";
            };
            contenedor.appendChild(div);
          }
        });
      }
    } catch (e) {
      console.error("Error CIMA:", e);
    }
  }

  function irSiguiente() {
    // Aquí sigue tu lógica original de salto entre steps
    alert("Navegando a la siguiente sección...");
  }
</script>

</body>
</html>
