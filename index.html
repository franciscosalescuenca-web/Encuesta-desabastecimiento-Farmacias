<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estudio Desabastecimiento</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #357337; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    h1 { color: white; text-align: center; font-size: 1.5rem; margin-bottom: 20px; max-width: 600px; }
    .card { background: #F9F9F9; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 500px; text-align: center; }
    .step { display: none; }
    .step.active { display: block; }
    button { background: #357337; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; font-weight: bold; }
    input, select { display: block; width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    .campo-busqueda { position: relative; }
    #resultados { border: 1px solid #ddd; border-top: none; max-height: 200px; overflow-y: auto; background: white; position: absolute; width: 100%; z-index: 999; border-radius: 0 0 10px 10px; text-align: left; }
    .item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
    .item:hover { background-color: #f1f8e9; }
  </style>
</head>
<body>

<h1>Encuesta para Oficinas de Farmacia sobre el desabastecimiento de medicamentos en la Región de Murcia</h1>

<div class="card">
  <div class="step active" id="s1">
    <h3>Datos del registro</h3>
    <input type="text" id="farmacia" placeholder="Nº Farmacia">
    <div class="campo-busqueda">
        <input type="text" id="medicamento" placeholder="Medicamento solicitado..." oninput="buscar()">
        <div id="resultados"></div>
    </div>
    <input type="text" id="cipa" placeholder="CIPA del Paciente">
    <button onclick="irSiguiente()">Siguiente</button>
  </div>

  <div class="step" id="s2">
    <h3>¿Disponía de stock?</h3>
    <button onclick="finalizar('N/A', 'N/A')">Sí</button>
    <button onclick="mostrarAcciones()">No</button>
  </div>

  <div class="step" id="s3">
    <h3>¿Qué acción realizó?</h3>
    <select id="accion" onchange="checkAccion()">
        <option value="Farmahelp/Luda">Utilicé herramientas especializadas (Farmahelp, Luda, etc.)</option>
        <option value="Otra farmacia">Contacté por otros medios con otra farmacia</option>
        <option value="Indicar buscar">Indiqué al paciente que buscara en otras farmacias</option>
        <option value="Derivar médico">Derivé al médico</option>
        <option value="Otras">Otras</option>
    </select>
    
    <div id="div-conseguido">
        <h3>¿Consiguió el paciente el medicamento?</h3>
        <button onclick="finalizar(document.getElementById('accion').value, 'Sí')">Sí</button>
        <button onclick="finalizar(document.getElementById('accion').value, 'No')">No</button>
        <button onclick="finalizar(document.getElementById('accion').value, 'No lo sé')">No lo sé</button>
    </div>
    <button id="btn-finalizar" style="display:none;" onclick="finalizar('Derivar médico', '')">Finalizar</button>
  </div>
</div>

<script>
  const urlGoogle = "https://script.google.com/macros/s/AKfycbwyHBf6QQwZ-0gaXdx838jhTLCyG78FwsBke-sWtqPgChnpocHpcnz7sU_6TJmjHLWp/exec";

  function buscar() {
    const q = document.getElementById('medicamento').value;
    const res = document.getElementById('resultados');
    if (q.length < 3) { res.innerHTML = ""; return; }
    fetch('https://cima.aemps.es/cima/rest/medicamentos?nombre=' + encodeURIComponent(q))
      .then(r => r.json())
      .then(data => {
        res.innerHTML = "";
        if(data.resultados) {
          data.resultados.slice(0, 5).forEach(m => {
            const div = document.createElement("div");
            div.className = "item";
            div.textContent = m.nombre;
            div.onclick = () => { document.getElementById('medicamento').value = m.nombre; res.innerHTML = ""; };
            res.appendChild(div);
          });
        }
      });
  }

  function irSiguiente() {
    document.getElementById('s1').classList.remove('active');
    document.getElementById('s2').classList.add('active');
  }

  function mostrarAcciones() {
    document.getElementById('s2').classList.remove('active');
    document.getElementById('s3').classList.add('active');
  }

  function checkAccion() {
    const accion = document.getElementById('accion').value;
    const divCons = document.getElementById('div-conseguido');
    const btnFin = document.getElementById('btn-finalizar');
    if (accion === 'Derivar médico') {
        divCons.style.display = 'none';
        btnFin.style.display = 'block';
    } else {
        divCons.style.display = 'block';
        btnFin.style.display = 'none';
    }
  }

  function finalizar(accion, conseguido) {
    const datos = {
      id: "ID-" + Date.now(),
      farmacia: document.getElementById("farmacia").value,
      medicamento: document.getElementById("medicamento").value,
      cipa: document.getElementById("cipa").value,
      accion: accion,
      consiguió: conseguido
    };

    fetch(urlGoogle, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(datos)
    }).then(() => {
      alert("¡Gracias, datos enviados!");
      location.reload();
    });
  }
</script>
</body>
</html>
