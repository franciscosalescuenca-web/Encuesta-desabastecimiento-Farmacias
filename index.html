<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estudio Desabastecimiento</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #357337; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    h1 { color: white; text-align: center; font-size: 1.4rem; margin-bottom: 10px; max-width: 600px; }
    .card { background: #F9F9F9; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 500px; text-align: center; }
    .step { display: none; }
    .step.active { display: block; }
    button { background: #357337; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; }
    input, select, textarea { display: block; width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    #resultados { border: 1px solid #ddd; max-height: 200px; overflow-y: auto; background: white; position: absolute; width: calc(100% - 60px); z-index: 999; }
    .item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
    .item:hover { background-color: #f1f8e9; }
  </style>
</head>
<body>

<h1>Encuesta de Desabastecimiento</h1>

<div class="card">
  <div class="step active" id="s1">
    <input type="text" id="farmacia" placeholder="Nº Farmacia">
    <input type="text" id="medicamento" placeholder="Buscar medicamento..." oninput="buscar()">
    <div id="resultados"></div>
    <input type="text" id="cipsns" placeholder="CIPSNS (8 B + 8 caracteres)" maxlength="16">
    <button onclick="irSiguiente()">Siguiente</button>
  </div>

  <div class="step" id="s2">
    <h3>¿Disponía de stock?</h3>
    <button onclick="finalizar('N/A', 'Sí hay stock')">Sí</button>
    <button onclick="mostrarAcciones()">No</button>
  </div>

  <div class="step" id="s3">
    <select id="accion">
        <option value="Utilicé herramientas especializadas">Utilicé herramientas especializadas</option>
        <option value="Contacté por otros medios">Contacté por otros medios</option>
        <option value="Indiqué al paciente que buscara en otras farmacias">Indiqué al paciente que buscara en otras farmacias</option>
        <option value="Derivé al médico">Derivé al médico</option>
        <option value="Otras">Otras</option>
    </select>
    <div id="div-conseguido">
        <button onclick="finalizar(document.getElementById('accion').value, 'Sí')">Conseguido: Sí</button>
        <button onclick="finalizar(document.getElementById('accion').value, 'No')">Conseguido: No</button>
    </div>
    <button onclick="finalizar('Derivé al médico', 'N/A')">Finalizar Derivación</button>
  </div>
</div>

<script>
  // URL de tu nuevo script implementado
  const urlGoogle = "https://script.google.com/macros/s/AKfycbwQ9PcMwyrbgx_e_BBxtFS7TtOmoq4IqBWLdVWH6IP632CEWt63_GoqpTHXqLUrKjY2ww/exec";
  let medicamentoSeleccionado = false;

  function hashString(str) {
      let hash = 0x811c9dc5;
      for (let i = 0; i < str.length; i++) {
          hash ^= str.charCodeAt(i);
          hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
      }
      return ("00000000" + (hash >>> 0).toString(16)).slice(-8).toUpperCase();
  }

  function buscar() {
    const q = document.getElementById('medicamento').value;
    const res = document.getElementById('resultados');
    if (q.length < 3) { res.innerHTML = ""; return; }
    fetch('https://cima.aemps.es/cima/rest/medicamentos?nombre=' + encodeURIComponent(q))
      .then(r => r.json())
      .then(data => {
        res.innerHTML = "";
        data.resultados?.slice(0, 5).forEach(m => {
          const div = document.createElement("div");
          div.className = "item";
          div.textContent = m.nombre;
          div.onclick = () => { document.getElementById('medicamento').value = m.nombre; res.innerHTML = ""; medicamentoSeleccionado = true; };
          res.appendChild(div);
        });
      });
  }

  function irSiguiente() {
    if (!medicamentoSeleccionado) { alert("Seleccione un medicamento"); return; }
    document.getElementById('s1').classList.remove('active');
    document.getElementById('s2').classList.add('active');
  }

  function mostrarAcciones() {
    document.getElementById('s2').classList.remove('active');
    document.getElementById('s3').classList.add('active');
  }

  function finalizar(accion, conseguido) {
    const datos = {
      id: "PAC-" + hashString(document.getElementById("cipsns").value + "SALT-PAC"),
      farmacia: "FAR-" + hashString(document.getElementById("farmacia").value + "SALT-FAR"),
      medicamento: document.getElementById("medicamento").value,
      accion: accion,
      consiguió: conseguido
    };

    fetch(urlGoogle, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(datos)
    }).then(() => { alert("¡Envío realizado correctamente!"); location.reload(); });
  }
</script>
</body>
</html>
